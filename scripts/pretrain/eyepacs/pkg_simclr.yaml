defaults:
  - _self_
  - augmentations: symmetric.yaml
  - wandb: private.yaml
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# disable hydra outputs
hydra:
  output_subdir: null
  run:
    dir: .

name: "pkg-simclr-eyepacs-datacomp_xl_s13b_b90k-pkg1.0-b512"
method: "pkg_simclr"
backbone:
  name: "vit_base"
method_kwargs:
  proj_hidden_dim: 4096
  proj_output_dim: 512
  temperature: 0.2
data:
  dataset: "custom"
  train_path: "/path/to/eyepacs/folder"
  num_workers: 16
optimizer:
  name: "adamw"
  batch_size: 128
  lr: 3.0e-5
  classifier_lr: 3.0e-5
  weight_decay: 0.1
scheduler:
  name: "warmup_cosine"
checkpoint:
  enabled: True
  dir: "trained_models"
  frequency: 1
auto_resume:
  enabled: False
prior_knowledge:
  weight_start: 1.0
  weight_end: 1.0
  weight_update: "none"
  clip_arch: "CLIP"
  clip_pretrained_source: "datacomp_xl_s13b_b90k"
  # datacomp_xl_s13b_b90k, dfn2b, laion2b_s34b_b88k, openai, laion400m_e32
  debias_factor: 1.0
  counterfactual_momentum: 0.999
  threshold: 0.7
  masked_counterfactual: False
  confidence_mask: False
  marginal_loss: False
  pkg_labels: ["dr_lesions"]

# overwrite PL stuff
max_epochs: 300
devices: [0, 1, 2, 3]
sync_batchnorm: True
accelerator: "gpu"
strategy: "ddp"
precision: 16-mixed
