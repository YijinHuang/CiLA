defaults:
  - _self_
  - wandb: private.yaml
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# disable hydra outputs
hydra:
  output_subdir: null
  run:
    dir: .

name: "finetuning"
pretrained_feature_extractor: None
backbone:
  name: "vit_base"
  kwargs:
    drop_path_rate: 0.1
pretrain_method: "mae"
data:
  dataset: "imagenet"
  train_path: "./datasets/imagenet/train"
  val_path: "./datasets/imagenet/val"
  format: "image_folder"
  num_workers: 4
optimizer:
  name: "adamw"
  batch_size: 64
  lr: 5e-4
  weight_decay: 0.05
  layer_decay: 0.75
scheduler:
  name: "warmup_cosine"
  warmup_start_lr: 0.0
checkpoint:
  enabled: True
  dir: "trained_models"
  frequency: 1
auto_resume:
  enabled: True
label_smoothing: 0.1
mixup: 0.8
cutmix: 1.0
finetune: True

# overwrite PL stuff
max_epochs: 100
devices: [0, 1, 2, 3, 4, 5, 6, 7]
sync_batchnorm: True
accelerator: "gpu"
strategy: "ddp"
precision: 16

# finetuning settings
finetuning:
  dataset: messidor2
  data_path: null
  save_path: null
  log_path: null
  checkpoint: null
  checkpoint_key: base_encoder
  linear: false
  num_classes: 5
  seed: 0
  device: cuda
  clip: false
  label_type: categories
  epochs: 20
  input_size: 224
  learning_rate: 1e-5
  criterion: ce
  optimizer: ADAM
  weight_decay: 1e-5
  batch_size: 16
  num_workers: 4
  kappa_prior: true
  eval_interval: 1
  save_interval: 100
  disable_progress: false
  clip_arch: CLIP
  clip_pretrained_source: datacomp_xl_s13b_b90k
